name: CI

on:
  pull_request:
    branches:
      - main
      - alpha
      - beta
  push:
    branches-ignore:
      - main
      - alpha
      - beta

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install build tools (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3 make g++

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun run test

  terminal-test:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI for terminal tests
        run: bun run build

      - name: Run built terminal tests
        run: bun run test:tuistory

  build-test:
    needs: [test, terminal-test]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install build tools (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3 make g++

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Test compilation
        run: |
          mkdir -p binaries
          bun build ./src/index.ts --compile --outfile ./binaries/autohand-test

      - name: Verify binary (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x ./binaries/autohand-test
          ./binaries/autohand-test --help

      - name: Smoke test Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        timeout-minutes: 1
        run: |
          $binary = (Resolve-Path "./binaries/autohand-test.exe").Path

          & $binary --version
          if ($LASTEXITCODE -ne 0) {
            throw "Windows --version smoke test failed with exit code $LASTEXITCODE"
          }

          & $binary --help | Out-Null
          if ($LASTEXITCODE -ne 0) {
            throw "Windows --help smoke test failed with exit code $LASTEXITCODE"
          }
